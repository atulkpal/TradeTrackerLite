            "on-secondary": "#002e6a",

            "on-tertiary-container": "#a27b00",
            "inverse-surface": "#d3e4fe",
            "surface": "#031427",
            "on-tertiary": "#3f2e00",
            "surface-container-high": "#1b2b3f",

            "background": "#031427",
            "on-primary-container": "#798098",
            "outline": "#909097",
            "on-background": "#d3e4fe",
            "primary-fixed": "#dae2fd",
            "on-primary-fixed-variant": "#3f465c",
            "on-tertiary-fixed-variant": "#5a4300",
            "on-primary-fixed": "#131b2e",
            "error": "#ffb4ab",
            "primary-fixed-dim": "#bec6e0",
            "primary-container": "#0f172a",

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    input:focus ~ label, input:not(:placeholder-shown) ~ label {
      transform: translateY(-24px) scale(0.85);
      background-color: #031427;
      padding: 0 4px;
      color: #bec6e0;
    }
    .segmented-picker-active {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body {
      background-color: #031427;
      color: #d3e4fe;
      -webkit-tap-highlight-color: transparent;
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    ::-webkit-scrollbar { display: none; }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md overflow-x-hidden pb-24">
<!-- Top AppBar -->
<header class="fixed top-0 w-full z-50 bg-surface flex items-center justify-between px-container-margin h-16">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-surface-variant overflow-hidden border border-outline-variant">
<img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD9jappoNx2XBShVVW3CgoYqY5Wvm9QMT_G4dfzDlV5Iwo1Bfpfc8IyKYkqVYn3C4733Cf3WQdi71eH1Yf-bucw0rXpvU8bl1YtF0QhOfTYhe7vyQMl5eXoLF50OfXxq1PR_ITf86P9cMNGgjB0Te6YqZC0mZYrbIXuBq9SjNouF9E_8NIXjg0yBkdO0CiEq0IsG9tACGI2OxzYtlfoil4ZOp9bvJMkZbVjfSVWFbSz7Oy3crUFWHX7vxv6TuldK3KpDP-ei_lmnYk"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Trade Journal Lite</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors active:opacity-80">
<span class="material-symbols-outlined text-primary">notifications</span>
</button>
</header>
<main class="mt-20 px-container-margin max-w-2xl mx-auto">
<div class="mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile mb-xs">Add New Trade</h2>
<p class="text-on-surface-variant font-body-md">Record your execution for post-trade analysis.</p>
</div>
<!-- Form Container -->
<div class="space-y-lg pb-12">
<!-- Symbol & Market Type Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Symbol Input -->
<div class="relative group">
<input class="w-full bg-transparent border-2 border-outline-variant rounded-lg px-md py-lg focus:border-secondary-container focus:ring-0 outline-none text-on-surface transition-all font-data-lg uppercase" id="symbol" placeholder=" " type="text"/>
<label class="absolute left-md top-4 text-on-surface-variant transition-all pointer-events-none px-1" for="symbol">Symbol (e.g., TSLA)</label>
</div>
<!-- Market Type Segmented Selector -->
<div class="flex flex-col gap-xs">
<span class="font-label-md text-on-surface-variant ml-1">Market Type</span>
<div class="flex bg-surface-container rounded-xl p-1 gap-1 h-14">
<button class="flex-1 rounded-lg text-label-md transition-all bg-secondary-container text-on-secondary-container font-bold" onclick="selectType(this, 'market')">Stock</button>
<button class="flex-1 rounded-lg text-label-md transition-all text-on-surface-variant hover:bg-surface-variant" onclick="selectType(this, 'market')">Forex</button>
<button class="flex-1 rounded-lg text-label-md transition-all text-on-surface-variant hover:bg-surface-variant" onclick="selectType(this, 'market')">Crypto</button>
</div>
</div>
</div>
<!-- Side & Quantity Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Buy/Sell Segmented Selector -->
<div class="flex flex-col gap-xs">
<span class="font-label-md text-on-surface-variant ml-1">Side</span>
<div class="flex bg-surface-container rounded-xl p-1 gap-1 h-14">
<button class="flex-1 rounded-lg text-label-md transition-all bg-secondary-container text-on-secondary-container font-bold" onclick="selectSide(this)">Buy</button>
<button class="flex-1 rounded-lg text-label-md transition-all text-on-surface-variant hover:bg-surface-variant" onclick="selectSide(this)">Sell</button>
</div>
</div>
<!-- Quantity Input -->
<div class="relative group mt-5">
<input class="w-full bg-transparent border-2 border-outline-variant rounded-lg px-md py-lg focus:border-secondary-container focus:ring-0 outline-none text-on-surface transition-all font-data-lg" id="quantity" placeholder=" " type="number"/>
<label class="absolute left-md top-4 text-on-surface-variant transition-all pointer-events-none px-1" for="quantity">Quantity</label>
</div>
</div>
<!-- Price Inputs Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="relative group">
<input class="w-full bg-transparent border-2 border-outline-variant rounded-lg px-md py-lg focus:border-secondary-container focus:ring-0 outline-none text-on-surface transition-all font-data-lg" id="entry-price" oninput="calculateStats()" placeholder=" " step="0.01" type="number"/>
<label class="absolute left-md top-4 text-on-surface-variant transition-all pointer-events-none px-1" for="entry-price">Entry Price</label>
</div>
<div class="relative group">
<input class="w-full bg-transparent border-2 border-outline-variant rounded-lg px-md py-lg focus:border-secondary-container focus:ring-0 outline-none text-on-surface transition-all font-data-lg" id="exit-price" oninput="calculateStats()" placeholder=" " step="0.01" type="number"/>
<label class="absolute left-md top-4 text-on-surface-variant transition-all pointer-events-none px-1" for="exit-price">Exit Price</label>
</div>
</div>
<!-- Auto-Calc Summary Section (Bento Card style) -->
<div class="grid grid-cols-2 gap-md p-lg bg-surface-container-high rounded-2xl border border-outline-variant/30">
<div class="flex flex-col">
<span class="font-label-md text-on-surface-variant mb-xs">Projected P/L</span>
<span class="font-data-lg text-data-lg text-primary" id="calc-pl">$0.00</span>
</div>
<div class="flex flex-col border-l border-outline-variant/30 pl-lg">
<span class="font-label-md text-on-surface-variant mb-xs">Risk:Reward</span>
<span class="font-data-lg text-data-lg text-tertiary" id="calc-rr">1:0.00</span>
</div>
</div>
<!-- Strategy & Setup -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-on-surface-variant ml-1" for="setup">Trade Setup</label>
<select class="w-full bg-surface-container border-2 border-outline-variant rounded-lg px-md py-md focus:border-secondary-container focus:ring-0 outline-none text-on-surface transition-all appearance-none" id="setup">
<option value="breakout">Breakout</option>
<option value="retest">Retest</option>
<option value="mean_reversion">Mean Reversion</option>
<option value="gap_fill">Gap Fill</option>
</select>
</div>
<!-- Emotion Selector -->
<div class="flex flex-col gap-xs">
<span class="font-label-md text-on-surface-variant ml-1">Trade Emotion</span>
<div class="flex justify-between bg-surface-container rounded-2xl p-md">
<button class="flex flex-col items-center gap-xs group p-sm rounded-xl transition-all hover:bg-surface-variant active:bg-secondary-container/20" onclick="setEmotion(this, 'sentiment_very_satisfied')">
<span class="material-symbols-outlined text-outline group-hover:text-tertiary transition-colors">sentiment_very_satisfied</span>
<span class="text-[10px] font-label-md uppercase opacity-60">Confident</span>
</button>
<button class="flex flex-col items-center gap-xs group p-sm rounded-xl transition-all hover:bg-surface-variant active:bg-secondary-container/20" onclick="setEmotion(this, 'sentiment_dissatisfied')">
<span class="material-symbols-outlined text-outline group-hover:text-error transition-colors">sentiment_dissatisfied</span>
<span class="text-[10px] font-label-md uppercase opacity-60">Fearful</span>
</button>
<button class="flex flex-col items-center gap-xs group p-sm rounded-xl transition-all hover:bg-surface-variant active:bg-secondary-container/20" onclick="setEmotion(this, 'monetization_on')">
<span class="material-symbols-outlined text-outline group-hover:text-secondary-fixed transition-colors">monetization_on</span>
<span class="text-[10px] font-label-md uppercase opacity-60">Greedy</span>
</button>
<button class="flex flex-col items-center gap-xs group p-sm rounded-xl transition-all hover:bg-surface-variant active:bg-secondary-container/20" onclick="setEmotion(this, 'balance')">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">balance</span>
<span class="text-[10px] font-label-md uppercase opacity-60">Neutral</span>
</button>
</div>
</div>
<!-- Notes -->
<div class="relative group">
<textarea class="w-full bg-transparent border-2 border-outline-variant rounded-lg px-md py-md focus:border-secondary-container focus:ring-0 outline-none text-on-surface transition-all" id="notes" placeholder=" " rows="4"></textarea>
<label class="absolute left-md top-4 text-on-surface-variant transition-all pointer-events-none px-1" for="notes">Trade Notes & Reflections</label>
</div>
<!-- Screenshot Attachment -->
<div class="flex flex-col gap-xs">
<span class="font-label-md text-on-surface-variant ml-1">Screenshot</span>
<div class="border-2 border-dashed border-outline-variant rounded-2xl h-40 flex flex-col items-center justify-center gap-sm bg-surface-container/30 hover:bg-surface-container/50 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-[32px] text-outline group-hover:text-primary transition-colors">add_photo_alternate</span>
<span class="font-label-md text-on-surface-variant">Tap to attach chart screenshot</span>
</div>
</div>
<!-- Save Button -->
<button class="w-full bg-secondary-container text-on-secondary-container font-headline-lg-mobile py-lg rounded-xl flex items-center justify-center gap-md active:scale-95 transition-transform shadow-lg">
<span class="material-symbols-outlined">save</span>
        Save Trade
      </button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container flex justify-around items-center h-20 px-sm pb-safe">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label-md text-label-md">Analytics</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1 active:scale-95 duration-200">
<span class="material-symbols-outlined">add</span>
<span class="font-label-md text-label-md">Add Trade</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</button>
</nav>
<script>
    function selectType(btn, group) {
      const parent = btn.parentElement;
      parent.querySelectorAll('button').forEach(b => {
        b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'font-bold');
        b.classList.add('text-on-surface-variant', 'hover:bg-surface-variant');
      });
      btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'font-bold');
      btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant');
    }

    function selectSide(btn) {
      const parent = btn.parentElement;
      parent.querySelectorAll('button').forEach(b => {
        b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'font-bold');
        b.classList.add('text-on-surface-variant', 'hover:bg-surface-variant');
      });
      btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'font-bold');
      btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant');
      calculateStats();
    }

    function setEmotion(btn, icon) {
      const parent = btn.parentElement;
      parent.querySelectorAll('button').forEach(b => {
        b.classList.remove('bg-secondary-container/20');
        b.querySelector('span:first-child').style.fontVariationSettings = "'FILL' 0";
      });
      btn.classList.add('bg-secondary-container/20');
      btn.querySelector('span:first-child').style.fontVariationSettings = "'FILL' 1";
    }

    function calculateStats() {
      const entry = parseFloat(document.getElementById('entry-price').value) || 0;
      const exit = parseFloat(document.getElementById('exit-price').value) || 0;
      const qty = parseFloat(document.getElementById('quantity').value) || 1;
      const sideText = document.querySelector('button.bg-secondary-container').innerText;
      
      let pl = 0;
      if (sideText === 'Buy') {
        pl = (exit - entry) * qty;
      } else {
        pl = (entry - exit) * qty;
      }

      const plEl = document.getElementById('calc-pl');
      plEl.innerText = (pl >= 0 ? '+' : '') + '$' + pl.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      plEl.classList.toggle('text-error', pl < 0);
      plEl.classList.toggle('text-primary', pl >= 0);

      // Simple R:R logic - assuming risk is 1% of entry for demo
      const risk = entry * 0.01;
      const reward = Math.abs(exit - entry);
      const rr = risk > 0 ? (reward / risk).toFixed(2) : "0.00";
      document.getElementById('calc-rr').innerText = `1:${rr}`;
    }
  </script>
</body></html>
