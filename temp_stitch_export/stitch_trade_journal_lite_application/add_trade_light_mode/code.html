<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8fafc; /* Standard Light Surface */
            color: #0f172a;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#ffffff",
                        "on-tertiary-fixed": "#251a00",
                        "tertiary-container": "#fef3c7",
                        "on-secondary-container": "#1e293b",
                        "on-primary-container": "#475569",
                        "tertiary-fixed-dim": "#f7be1d",
                        "inverse-on-surface": "#ffffff",
                        "outline": "#cbd5e1",
                        "secondary-fixed": "#e2e8f0",
                        "secondary-fixed-dim": "#94a3b8",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#565e74",
                        "on-tertiary": "#3f2e00",
                        "on-secondary-fixed-variant": "#0f172a",
                        "on-primary": "#ffffff",
                        "surface-bright": "#ffffff",
                        "surface-variant": "#f1f5f9",
                        "on-secondary-fixed": "#0f172a",
                        "primary-fixed": "#dae2fd",
                        "surface-dim": "#f1f5f9",
                        "on-tertiary-container": "#92400e",
                        "on-surface-variant": "#64748b",
                        "primary": "#0566d9",
                        "error-container": "#fee2e2",
                        "on-tertiary-fixed-variant": "#5a4300",
                        "surface-tint": "#0566d9",
                        "error": "#ef4444",
                        "on-primary-fixed-variant": "#3f465c",
                        "inverse-surface": "#0f172a",
                        "on-error": "#ffffff",
                        "on-background": "#0f172a",
                        "tertiary-fixed": "#ffdf9a",
                        "secondary": "#64748b",
                        "tertiary": "#f59e0b",
                        "surface-container-high": "#f8fafc",
                        "on-surface": "#0f172a",
                        "background": "#f8fafc",
                        "primary-fixed-dim": "#bec6e0",
                        "outline-variant": "#e2e8f0",
                        "surface-container-highest": "#f1f5f9",
                        "surface": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f8fafc",
                        "primary-container": "#eff6ff",
                        "on-primary-fixed": "#1e293b",
                        "on-error-container": "#991b1b",
                        "secondary-container": "#e2e8f0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "base": "4px",
                        "xs": "4px",
                        "md": "16px",
                        "gutter": "12px",
                        "sm": "8px",
                        "lg": "24px",
                        "container-margin": "16px"
                    },
                    "fontFamily": {
                        "title-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "data-lg": ["JetBrains Mono"],
                        "label-md": ["JetBrains Mono"],
                        "display-lg": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "data-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md flex items-center justify-between px-container-margin h-16">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-variant/50 p-2 rounded-full transition-colors">arrow_back</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">New Trade</h1>
</div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant">history</span>
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
<img alt="trader_profile_photo" class="w-full h-full object-cover" data-alt="A professional headshot of a focused financial trader in a light-filled modern office. The background is softly blurred showing minimalist desk setups and large windows with bright natural lighting. The overall style is clean, corporate, and trustworthy, with high-key lighting that emphasizes clarity and professionalism." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVhgoHyGxsK_rFM2I695xIXkE27wZ8ituBNADbBZywxPhVrhTB8-v9EMnTXwnWEJzd9-KchMORoh7B7KNSaP3JLhbDpmzmtNTvBEWrJHhX8NJCyhviL4eeyAWi0h43huKCsYEMXgli9EnCrblpxh_DsjyyT1zv9RC3MReDPZc6ZZfqzn6Ellr3yZnW2x34DM7KldAWcIdUvnyd2UaSS1qg37b08rT8Mzxb21yZKgkaTpVMtS8r_68Qv7pvEqIVuudHgumqVhkkiMk"/>
</div>
</div>
</header>
<main class="mt-20 px-container-margin max-w-2xl mx-auto space-y-lg">
<!-- Quick Insight Section (Bento Style) -->
<section class="grid grid-cols-2 gap-md">
<div class="glass-card p-md rounded-xl shadow-sm col-span-2">
<p class="text-on-surface-variant font-label-md text-label-md mb-xs">Active Session</p>
<div class="flex justify-between items-end">
<h2 class="font-headline-lg text-headline-lg text-on-surface">NY AM Session</h2>
<span class="bg-primary/10 text-primary px-sm py-xs rounded-full font-label-md text-label-md">High Volatility</span>
</div>
</div>
</section>
<!-- Core Trade Form -->
<div class="bg-surface p-lg rounded-xl border border-outline-variant shadow-sm space-y-lg">
<!-- Asset & Market -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Asset Pair</label>
<div class="relative">
<input class="w-full bg-surface-container border-outline-variant border-2 rounded-xl h-12 px-md focus:border-primary focus:ring-0 transition-all font-data-lg text-data-lg outline-none" placeholder="e.g. BTC/USDT" type="text"/>
<span class="material-symbols-outlined absolute right-md top-3 text-on-surface-variant">search</span>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Market Type</label>
<select class="w-full bg-surface-container border-outline-variant border-2 rounded-xl h-12 px-md focus:border-primary focus:ring-0 transition-all appearance-none outline-none">
<option>Spot Market</option>
<option>Perpetual Futures</option>
<option>Options</option>
</select>
</div>
</div>
<!-- Side & Quantity -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Trade Side</label>
<div class="flex p-1 bg-surface-container rounded-xl border border-outline-variant">
<button class="flex-1 py-2 rounded-lg font-title-md text-title-md transition-all bg-primary text-white" id="side-long" onclick="toggleSide('long')">Long</button>
<button class="flex-1 py-2 rounded-lg font-title-md text-title-md transition-all text-on-surface-variant" id="side-short" onclick="toggleSide('short')">Short</button>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Quantity</label>
<div class="relative">
<input class="w-full bg-surface-container border-outline-variant border-2 rounded-xl h-12 px-md focus:border-primary focus:ring-0 transition-all font-data-lg text-data-lg outline-none" placeholder="0.00" type="number"/>
<span class="absolute right-md top-3 font-label-md text-on-surface-variant">LOTS</span>
</div>
</div>
</div>
<!-- Price Points -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Entry Price</label>
<input class="w-full bg-surface-container border-outline-variant border-2 rounded-xl h-12 px-md focus:border-primary focus:ring-0 transition-all font-data-lg text-data-lg outline-none" placeholder="64,250.00" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Exit Price</label>
<input class="w-full bg-surface-container border-outline-variant border-2 rounded-xl h-12 px-md focus:border-primary focus:ring-0 transition-all font-data-lg text-data-lg outline-none" placeholder="65,100.00" type="text"/>
</div>
</div>
<!-- Trade Emotion -->
<div class="space-y-md">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Trade Emotion</label>
<div class="flex justify-between items-center bg-surface-container-highest/30 p-md rounded-2xl border border-outline-variant/50">
<button class="emotion-btn flex flex-col items-center gap-xs p-sm rounded-xl hover:bg-white transition-all active:scale-95 group">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-blue-500 transition-colors">sentiment_very_satisfied</span>
<span class="font-label-md text-label-md text-on-surface-variant">Zen</span>
</button>
<button class="emotion-btn flex flex-col items-center gap-xs p-sm rounded-xl hover:bg-white transition-all active:scale-95 group">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-amber-500 transition-colors">sentiment_neutral</span>
<span class="font-label-md text-label-md text-on-surface-variant">Neutral</span>
</button>
<button class="emotion-btn flex flex-col items-center gap-xs p-sm rounded-xl hover:bg-white transition-all active:scale-95 group">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-orange-500 transition-colors">sentiment_dissatisfied</span>
<span class="font-label-md text-label-md text-on-surface-variant">Anxious</span>
</button>
<button class="emotion-btn flex flex-col items-center gap-xs p-sm rounded-xl hover:bg-white transition-all active:scale-95 group">
<span class="material-symbols-outlined text-3xl text-on-surface-variant group-hover:text-red-500 transition-colors">sentiment_very_dissatisfied</span>
<span class="font-label-md text-label-md text-on-surface-variant">Fired</span>
</button>
</div>
</div>
<!-- Notes -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Trade Notes</label>
<textarea class="w-full bg-surface-container border-outline-variant border-2 rounded-xl p-md focus:border-primary focus:ring-0 transition-all outline-none resize-none" placeholder="Identify strategy confluence, market structure, or psychological state..." rows="3"></textarea>
</div>
<!-- Save Button -->
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline-lg-mobile text-headline-lg-mobile shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-lg">
<span class="material-symbols-outlined">save</span>
                Save Trade
            </button>
</div>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container flex justify-around items-center h-20 px-sm pb-safe shadow-2xl border-t border-outline-variant/30">
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors cursor-pointer">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1 active:scale-95 transition-transform duration-200 cursor-pointer">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label-md text-label-md">Analytics</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors cursor-pointer">
<span class="material-symbols-outlined">psychology</span>
<span class="font-label-md text-label-md">AI Insights</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors cursor-pointer">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</div>
</nav>
<script>
        function toggleSide(side) {
            const longBtn = document.getElementById('side-long');
            const shortBtn = document.getElementById('side-short');
            
            if (side === 'long') {
                longBtn.classList.add('bg-primary', 'text-white');
                longBtn.classList.remove('text-on-surface-variant');
                shortBtn.classList.remove('bg-primary', 'text-white');
                shortBtn.classList.add('text-on-surface-variant');
            } else {
                shortBtn.classList.add('bg-primary', 'text-white');
                shortBtn.classList.remove('text-on-surface-variant');
                longBtn.classList.remove('bg-primary', 'text-white');
                longBtn.classList.add('text-on-surface-variant');
            }
        }

        // Emotion buttons interaction
        document.querySelectorAll('.emotion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.emotion-btn').forEach(b => {
                    b.classList.remove('bg-white', 'shadow-md', 'ring-2', 'ring-primary/20');
                    b.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
                });
                btn.classList.add('bg-white', 'shadow-md', 'ring-2', 'ring-primary/20');
                btn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
</body></html>
